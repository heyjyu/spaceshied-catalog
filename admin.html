<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- HTML은 항상 최신으로 받게(인앱 브라우저 캐시로 옛 화면 보이던 것 방지) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>관리자 — 상품 관리</title>
  <!-- 테마: 모바일(≤860px) 라이트 고정, 데스크톱은 저장값(모든 페이지 동일 로직) -->
  <script>document.documentElement.dataset.theme = window.matchMedia("(max-width: 860px)").matches ? "light" : (localStorage.getItem("theme") || "light");</script>
  <link rel="stylesheet" href="styles.css?v=69" />
  <style>
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
    .admin-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 22px; }
    .admin-top h1 { font-size: 21px; margin: 0; flex: none; letter-spacing: -.02em; }
    .admin-search { position: relative; flex: 1; min-width: 200px; max-width: 440px; }
    .admin-search svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: var(--muted); pointer-events: none; }
    .admin-search input {
      width: 100%; padding: 11px 16px 11px 40px; border: 1px solid transparent;
      border-radius: var(--radius-pill); background: var(--panel-2); color: var(--text);
      font-size: 14px; outline: none; transition: background .12s, border-color .12s, box-shadow .12s; }
    .admin-search input::placeholder { color: var(--muted); }
    .admin-search input:focus { background: var(--panel); border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    #adminTheme { font-size: 16px; }
    .notice { background: var(--brand-soft); border: 1px solid var(--border); border-radius: var(--radius-sm);
              padding: 14px 16px; color: var(--text); line-height: 1.6; }
    .notice code { background: rgba(0,0,0,.06); padding: 1px 6px; border-radius: 6px; }
    /* 로그인 */
    .login-box { max-width: 360px; margin: 8vh auto; background: var(--panel); border: 1px solid var(--border);
                 border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 24px; }
    .login-box h2 { margin: 0 0 4px; font-size: 19px; }
    .login-box p { margin: 0 0 18px; color: var(--muted); font-size: 13px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; color: var(--text); margin-bottom: 7px; font-weight: 700; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px;
      font-size: 14.5px; background: var(--panel); color: var(--text); outline: none;
      transition: border-color .12s, box-shadow .12s; }
    .field input::placeholder { color: var(--muted); }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .full-btn { width: 100%; padding: 12px; font-weight: 700; justify-content: center; text-align: center; }
    .login-box a { color: var(--brand); }
    .login-box a:visited { color: var(--brand); }
    /* 로그인 → 카탈로그로 돌아가기: 보조 버튼 */
    .back-link { margin-top: 10px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); font-weight: 600; }
    .back-link:hover { background: var(--border-soft); }
    /* 로그아웃: 또렷한 버튼(빨강 테두리 강조) */
    .logout-btn { color: var(--danger); border-color: var(--border); }
    .logout-btn:hover { background: #fdecec; border-color: var(--danger); }
    [data-theme="dark"] .logout-btn:hover { background: #3a1715; }
    /* 카테고리 추가 버튼: 리스트 위, 눈에 띄는 솔리드 파란 버튼(흰 글씨 항상 또렷) */
    .cat-add-btn { width: 100%; justify-content: center; height: 52px; margin-bottom: 14px;
      background: var(--brand); border: 1px solid var(--brand); color: #fff;
      font-weight: 700; font-size: 15.5px; box-shadow: 0 2px 10px rgba(49,130,246,.28); }
    .cat-add-btn:hover { background: var(--brand-press); border-color: var(--brand-press); color: #fff; }
    /* 카테고리 삭제 버튼 */
    .cat-del { flex: none; width: 30px; height: 30px; border: 1px solid var(--border); background: var(--panel);
      border-radius: 8px; color: var(--danger); cursor: pointer; font-size: 19px; line-height: 1; padding: 0; }
    .cat-del:hover { background: #fdecec; border-color: var(--danger); }
    [data-theme="dark"] .cat-del:hover { background: #3a1715; }
    .err { color: var(--danger); font-size: 13px; margin-top: 8px; min-height: 18px; }
    /* 목록 */
    .prod-row { display: grid; grid-template-columns: 26px 56px 1fr auto; gap: 12px; align-items: center;
                background: var(--panel); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
                padding: 10px 12px; margin-bottom: 8px; }
    .prod-row img, .prod-row .noimg { width: 52px; height: 52px; border-radius: 10px; object-fit: cover;
                background: var(--panel-2); border: 1px solid var(--border); }
    .prod-row .pname { font-weight: 600; }
    .prod-row .psub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .prod-row .ops { display: flex; gap: 6px; }
    .prod-row .rowchk { width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand); }
    .prod-row.sel { border-color: var(--brand); background: var(--brand-soft); }
    /* 일괄 작업 바 */
    .bulk-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
      padding: 8px 12px; background: var(--panel-2); border: 1px solid var(--border-soft); border-radius: var(--radius-sm); }
    .bulk-bar label { display: flex; align-items: center; gap: 7px; font-size: 13.5px; color: var(--text); cursor: pointer; user-select: none; }
    .bulk-bar input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand); }
    .bulk-bar .bulk-count { color: var(--muted); font-size: 13px; margin-left: auto; }
    .bulk-bar .bulk-del { color: var(--danger); border-color: var(--border); }
    .bulk-bar .bulk-del:disabled { opacity: .4; cursor: default; }
    .bulk-bar .bulk-del:not(:disabled):hover { background: #fdecec; border-color: var(--danger); }
    [data-theme="dark"] .bulk-bar .bulk-del:not(:disabled):hover { background: #3a1715; }
    /* 카테고리 관리 */
    .cat-row { display: flex; align-items: center; gap: 12px; background: var(--panel);
      border: 1px solid var(--border-soft); border-radius: 12px; padding: 10px 14px; margin-bottom: 8px; }
    .cat-row.dragging { opacity: .45; }
    .cat-row .drag { cursor: grab; color: var(--muted); font-size: 18px; user-select: none; line-height: 1; }
    .cat-row .cat-label { flex: none; width: 240px; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; background: var(--panel); color: var(--text); outline: none; }
    .cat-row .cat-label:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .cat-row .cat-key { color: var(--muted); font-size: 12px; flex: 1; }
    .cat-row .cat-vis-l { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); white-space: nowrap; }
    .cat-move { display: flex; flex-direction: column; gap: 2px; flex: none; }
    .cat-move .catmv { width: 28px; height: 20px; border: 1px solid var(--border); background: var(--panel);
      border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 10px; line-height: 1; padding: 0; }
    .cat-move .catmv:hover { background: var(--brand-soft); color: var(--brand); border-color: var(--brand); }
    /* 모달 폼 */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 60; display: flex;
                align-items: flex-start; justify-content: center; overflow-y: auto; padding: 24px 12px; }
    .modal { background: var(--panel); border-radius: 20px; width: 600px; max-width: 100%;
             box-shadow: var(--shadow-lg); padding: 28px 28px 22px; }
    .modal h3 { margin: 0 0 20px; font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
    /* 섹션형 폼 */
    .form-sec { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
      margin: 22px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); }
    .form-sec:first-of-type { margin-top: 4px; }
    /* 상태 pill */
    .pill-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-opt { padding: 9px 16px; border: 1px solid var(--border); border-radius: var(--radius-pill); background: var(--panel);
      color: var(--text); font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .12s; }
    .pill-opt:hover { border-color: var(--brand); }
    .pill-opt.on { background: var(--brand); border-color: var(--brand); color: #fff; }
    /* 마스터 ID */
    .master-id { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .master-id b { color: var(--text); font-size: 15px; font-variant-numeric: tabular-nums; }
    /* 바로가기 chip */
    .quick-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .qlink { display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 13px; font-weight: 600; color: var(--text); text-decoration: none; background: var(--panel); }
    .qlink[aria-disabled="true"] { opacity: .38; pointer-events: none; }
    .qlink .qi { width: 20px; height: 20px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff; }
    .qi.n { background: #03c75a; } .qi.c { background: #ee2b2b; } .qi.f { background: #4b5bdc; } .qi.s { background: #e79a2b; }
    .qlink:hover { filter: brightness(.97); }
    .qext { font-size: 11px; opacity: .7; }
    /* 채널 색으로 채운 칩 (미등록은 .off 로 흐림) */
    .qlink.n { background: #e4f7ec; border-color: #a7e5c3; color: #0b7a3e; }
    .qlink.c { background: #fdeceb; border-color: #f4b9b5; color: #c02620; }
    .qlink.f { background: #ece9fb; border-color: #c3b9f2; color: #4b3fbf; }
    .qlink.s { background: #fdf2df; border-color: #efd39a; color: #a9700a; }
    .qlink.off { opacity: .3; pointer-events: none; }
    [data-theme="dark"] .qlink.n { background: #123020; border-color:#1f5236; color:#5fd98c; }
    [data-theme="dark"] .qlink.c { background: #3a1715; border-color:#5e2420; color:#f2938c; }
    [data-theme="dark"] .qlink.f { background: #241e42; border-color:#3b3170; color:#b3a6f7; }
    [data-theme="dark"] .qlink.s { background: #33280d; border-color:#5a4715; color:#e6b53d; }
    /* 링크 입력칸 아이콘 배지 프리픽스 — 연한 톤, N·C 원형, Flow·1688 알약형 */
    .link-row { display: flex; align-items: center; gap: 10px; }
    .link-row input { flex: 1; }
    .link-ico { flex: none; height: 34px; display: inline-flex; align-items: center; justify-content: center;
      font-size: 12.5px; font-weight: 800; gap: 4px; }
    .link-ico.n, .link-ico.c { width: 34px; border-radius: 50%; }
    .link-ico.f, .link-ico.b { padding: 0 13px; border-radius: 10px; }
    .link-ico.n { background: #e4f7ec; color: #0b7a3e; }
    .link-ico.c { background: #fdeceb; color: #c02620; }
    .link-ico.f { background: #ece9fb; color: #4b3fbf; }
    .link-ico.b { background: #fdf2df; color: #a9700a; }
    [data-theme="dark"] .link-ico.n { background: #123020; color: #5fd98c; }
    [data-theme="dark"] .link-ico.c { background: #3a1715; color: #f2938c; }
    [data-theme="dark"] .link-ico.f { background: #241e42; color: #b3a6f7; }
    [data-theme="dark"] .link-ico.b { background: #33280d; color: #e6b53d; }
    /* 스트랩 형태 toggle */
    .shape-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .shape-opt { text-align: center; padding: 14px 10px; border: 1px solid var(--border); border-radius: 14px; cursor: pointer;
      background: var(--panel); transition: all .12s; }
    .shape-opt:hover { border-color: var(--brand); }
    .shape-opt.on { border-color: var(--brand); background: var(--brand-soft); box-shadow: 0 0 0 2px var(--brand-soft); }
    .shape-opt .st-title { font-weight: 700; font-size: 14.5px; color: var(--text); }
    .shape-opt .st-sub { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
    .field textarea { min-height: 78px; resize: vertical; font-family: inherit; }
    .cost-row { display: flex; align-items: center; gap: 8px; }
    .cost-row input { flex: 1; } .cost-row .unit { color: var(--muted); font-size: 13px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .modal-actions .btn { height: 50px; border-radius: 14px; font-size: 15px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; }
    .modal-actions .btn.ghost { flex: 1; background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    .modal-actions .btn.ghost:hover { background: var(--border-soft); }
    .modal-actions .btn.brand { flex: 2; }
    /* 파일 선택 버튼 예쁘게 (구식 네이티브 버튼 대체) */
    input[type=file] { font-size: 13px; color: var(--muted); }
    input[type=file]::file-selector-button {
      padding: 8px 14px; margin-right: 10px; border: 1px solid var(--border); border-radius: 10px;
      background: var(--panel-2); color: var(--text); font-weight: 600; font-size: 13px; cursor: pointer;
      transition: background .12s, border-color .12s, color .12s; }
    input[type=file]::file-selector-button:hover { background: var(--brand-soft); border-color: var(--brand); color: var(--brand); }
    .thumb-preview { width: 84px; height: 84px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border);
                     background: var(--panel-2); }
    @media (max-width: 560px) { .grid2 { grid-template-columns: 1fr; } }
    /* 커스텀 확인 팝업 (인앱 브라우저에서 native confirm 막히는 것 대비) */
    .uiconfirm-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90;
      display: flex; align-items: center; justify-content: center; padding: 24px; }
    .uiconfirm { background: var(--panel); border-radius: 18px; box-shadow: var(--shadow-lg);
      max-width: 360px; width: 100%; padding: 24px 22px 18px; }
    .uiconfirm .msg { font-size: 15px; line-height: 1.55; color: var(--text); white-space: pre-line; margin-bottom: 20px; }
    .uiconfirm .acts { display: flex; gap: 10px; }
    .uiconfirm .acts .btn { flex: 1; height: 46px; border-radius: 12px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; }
    .uiconfirm .acts .btn.ghost { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); }
    .uiconfirm .acts .btn.danger { background: var(--danger); border: 1px solid var(--danger); color: #fff; }
  </style>
</head>
<body>
  <div class="admin-wrap" id="app">
    <div id="boot" class="notice">불러오는 중…</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=6"></script>
  <script>
  // ====== 상수 ======
  const S = (CONFIG && CONFIG.SUPABASE) || {};
  const FIELDS = S.COLUMN_MAP || { name: "제품명", model: "기종", material: "재질",
    size: "스트랩 규격", buckle: "체결 형태", color: "색상", image: "이미지", store_url: "네이버스토어" };
  const TABLE = S.TABLE || "products";
  const BUCKET = "product-images";
  const app = document.getElementById("app");
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  let sb = null, rows = [];

  // ====== 커스텀 확인 팝업 (인앱 브라우저에서 native confirm 이 막히는 것 대비) ======
  function uiConfirm(message, { okText = "확인", cancelText = "취소", danger = false } = {}) {
    return new Promise((resolve) => {
      const bg = document.createElement("div");
      bg.className = "uiconfirm-bg";
      bg.innerHTML = `
        <div class="uiconfirm">
          <div class="msg">${esc(message)}</div>
          <div class="acts">
            <button class="btn ghost" data-act="cancel">${esc(cancelText)}</button>
            <button class="btn ${danger ? "danger" : "brand"}" data-act="ok">${esc(okText)}</button>
          </div>
        </div>`;
      document.body.appendChild(bg);
      const done = (v) => { bg.remove(); document.removeEventListener("keydown", onKey); resolve(v); };
      const onKey = (e) => { if (e.key === "Escape") done(false); else if (e.key === "Enter") done(true); };
      document.addEventListener("keydown", onKey);
      bg.addEventListener("click", (e) => { if (e.target === bg) done(false); });
      bg.querySelector('[data-act="cancel"]').addEventListener("click", () => done(false));
      bg.querySelector('[data-act="ok"]').addEventListener("click", () => done(true));
    });
  }

  // ====== 부팅 ======
  function boot() {
    if (!S.URL || !S.ANON_KEY) {
      app.innerHTML = `<div class="notice">
        <b>아직 Supabase 가 연결되지 않았습니다.</b><br>
        <code>config.js</code> 의 <code>SUPABASE.URL</code> / <code>ANON_KEY</code> 를 채워주세요.
        자세한 방법은 <code>SUPABASE_SETUP.md</code> 참고.</div>`;
      return;
    }
    if (!window.supabase) {
      app.innerHTML = `<div class="notice">Supabase 라이브러리를 불러오지 못했습니다(인터넷 확인).</div>`;
      return;
    }
    sb = window.supabase.createClient(S.URL, S.ANON_KEY);
    sb.auth.getSession().then(({ data }) => {
      if (data.session) showAdmin(); else showLogin();
    });
  }

  // ====== 로그인 ======
  function showLogin() {
    app.innerHTML = `
      <div class="login-box">
        <h2>관리자 로그인</h2>
        <p>Supabase 에 등록한 이메일/비밀번호로 로그인하세요.</p>
        <div class="field"><label>이메일</label><input id="email" type="email" autocomplete="username"></div>
        <div class="field"><label>비밀번호</label><input id="pw" type="password" autocomplete="current-password"></div>
        <button class="btn brand full-btn" id="loginBtn">로그인</button>
        <div class="err" id="loginErr"></div>
        <a class="btn full-btn back-link" href="index.html"><span aria-hidden="true">←</span> 카탈로그로 돌아가기</a>
      </div>`;
    const go = async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("pw").value;
      document.getElementById("loginErr").textContent = "";
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) document.getElementById("loginErr").textContent = "로그인 실패: " + error.message;
      else showAdmin();
    };
    document.getElementById("loginBtn").addEventListener("click", go);
    document.getElementById("pw").addEventListener("keydown", (e) => { if (e.key === "Enter") go(); });
  }

  // ====== 관리자 화면 ======
  async function showAdmin() {
    app.innerHTML = `
      <div class="admin-top">
        <h1>상품 관리</h1>
        <div class="admin-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="q" placeholder="상품명 검색…">
        </div>
        <button class="btn icon-only" id="adminTheme" title="다크/라이트 전환" aria-label="테마 전환">🌙</button>
        <button class="btn" id="colBtn" title="카탈로그 표 컬럼 순서/이름/노출 관리">📋 표 컬럼</button>
        <button class="btn" id="valBtn" title="기종·호환·재질 등 필터 값 일괄 변경/정리">🏷️ 값 정리</button>
        <button class="btn brand" id="addBtn">＋ 새 상품</button>
        <a class="btn" href="index.html"><span aria-hidden="true">🛍️</span> 카탈로그</a>
        <button class="btn logout-btn" id="logoutBtn" title="로그아웃"><span aria-hidden="true">↩</span> 로그아웃</button>
      </div>
      <div id="list">불러오는 중…</div>`;
    document.getElementById("logoutBtn").addEventListener("click", async () => { await sb.auth.signOut(); showLogin(); });
    document.getElementById("addBtn").addEventListener("click", () => openForm(null));
    document.getElementById("colBtn").addEventListener("click", openColumns);
    document.getElementById("valBtn").addEventListener("click", openValues);
    document.getElementById("q").addEventListener("input", (e) => renderList(e.target.value.trim()));
    const at = document.getElementById("adminTheme");
    const setThemeIcon = () => { at.textContent = document.documentElement.dataset.theme === "dark" ? "☀️" : "🌙"; };
    setThemeIcon();
    at.addEventListener("click", () => {
      const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem("theme", next); } catch (e) {}
      setThemeIcon();
    });
    await loadRows();
  }

  async function loadRows() {
    const { data, error } = await sb.from(TABLE).select("*").order("sort", { ascending: true, nullsFirst: false });
    const listEl = document.getElementById("list");
    if (error) { if (listEl) listEl.innerHTML = `<div class="notice">목록 오류: ${esc(error.message)}</div>`; return; }
    rows = data || [];
    if (!listEl) return;   // 다른 화면(값 정리·표 컬럼 등)에 있으면 목록 렌더 건너뜀
    const q = document.getElementById("q");        // 수정/삭제 후에도 검색 결과 유지
    renderList(q ? q.value.trim() : "");
    // 카탈로그 상세 '수정' 링크(admin.html?edit=ID)로 진입 시 해당 상품 폼 자동 오픈(1회)
    if (!loadRows._editHandled) {
      const editId = new URLSearchParams(location.search).get("edit");
      if (editId) {
        loadRows._editHandled = true;
        const rec = rows.find((x) => String(x.id) === String(editId));
        if (rec) openForm(rec);
        history.replaceState(null, "", location.pathname);  // URL 정리(새로고침 시 재오픈 방지)
      }
    }
  }

  const selected = new Set();   // 선택된 상품 id

  function renderList(term) {
    term = (term || "").toLowerCase();
    const list = rows.filter((r) => !term || String(r.name || "").toLowerCase().includes(term));
    const el = document.getElementById("list");
    if (!list.length) { el.innerHTML = `<div class="notice">상품이 없습니다. ‘+ 새 상품’으로 추가하세요.</div>`; return; }
    // 화면에 없는(검색 필터된) 선택은 정리
    const visibleIds = new Set(list.map((r) => String(r.id)));
    [...selected].forEach((id) => { if (!visibleIds.has(id)) selected.delete(id); });
    const allChecked = list.length && list.every((r) => selected.has(String(r.id)));
    el.innerHTML = `
      <div class="bulk-bar">
        <label><input type="checkbox" id="chkAll" ${allChecked ? "checked" : ""}> 전체 선택</label>
        <button class="btn bulk-del" id="bulkDelBtn" ${selected.size ? "" : "disabled"}>선택 삭제${selected.size ? ` (${selected.size})` : ""}</button>
        <span class="bulk-count">${list.length}개</span>
      </div>` +
      list.map((r) => `
      <div class="prod-row${selected.has(String(r.id)) ? " sel" : ""}">
        <input type="checkbox" class="rowchk" data-chk="${r.id}" ${selected.has(String(r.id)) ? "checked" : ""}>
        ${r.image ? `<img src="${esc(r.image)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'noimg'}))">` : `<div class="noimg"></div>`}
        <div>
          <div class="pname">${esc(r.name)}</div>
          <div class="psub">${[r.model, r.material, r.size, r.buckle].filter(Boolean).map(esc).join(" · ")}</div>
        </div>
        <div class="ops">
          <button class="btn" data-edit="${r.id}">수정</button>
          <button class="btn ghost" data-del="${r.id}">삭제</button>
        </div>
      </div>`).join("");
    el.querySelectorAll("[data-edit]").forEach((b) => b.addEventListener("click",
      () => openForm(rows.find((x) => String(x.id) === b.dataset.edit))));
    el.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click",
      () => delRow(rows.find((x) => String(x.id) === b.dataset.del))));
    el.querySelectorAll("[data-chk]").forEach((cb) => cb.addEventListener("change", () => {
      const id = cb.dataset.chk;
      if (cb.checked) selected.add(id); else selected.delete(id);
      renderList(document.getElementById("q").value.trim());
    }));
    const chkAll = document.getElementById("chkAll");
    if (chkAll) chkAll.addEventListener("change", () => {
      if (chkAll.checked) list.forEach((r) => selected.add(String(r.id)));
      else list.forEach((r) => selected.delete(String(r.id)));
      renderList(document.getElementById("q").value.trim());
    });
    const bulkBtn = document.getElementById("bulkDelBtn");
    if (bulkBtn) bulkBtn.addEventListener("click", bulkDelete);
  }

  async function bulkDelete() {
    const ids = [...selected];
    if (!ids.length) return;
    const names = ids.map((id) => { const r = rows.find((x) => String(x.id) === id); return r ? r.name : id; });
    const preview = names.slice(0, 10).join("\n") + (names.length > 10 ? `\n… 외 ${names.length - 10}개` : "");
    if (!await uiConfirm(`선택한 ${ids.length}개 상품을 삭제할까요?\n\n${preview}`, { okText: `${ids.length}개 삭제`, danger: true })) return;
    const { error } = await sb.from(TABLE).delete().in("id", ids.map(Number));
    if (error) { alert("일괄 삭제 실패: " + error.message); return; }
    selected.clear();
    signalCatalog();
    await loadRows();
  }

  // ====== 추가/수정 폼 ======
  // 드롭다운(datalist)으로 만들 컬럼: 기종·재질·규격·체결. 기존 값 선택 + 새 값 입력 가능
  // base_size·connector·base_family 도 datalist(기존 값 선택 + 새 값) → 오타로 그룹 쪼개짐 방지
  const DROPDOWN = new Set(["model", "material", "size", "buckle", "base_size", "connector", "base_family"]);
  function distinctVals(col) {
    const set = new Set();
    rows.forEach((r) => { const v = String(r[col] || "").trim(); if (v) set.add(v); });
    return [...set].sort((a, b) => a.localeCompare(b, "ko"));

      return `<a class="qlink ${cls}${u ? "" : " off"}" ${u ? `href="${esc(u)}" target="_blank" rel="noopener"` : 'aria-disabled="true"'}><span class="qi ${cls}">${icon}</span>${label}${ext}</a>`; };

        ${isNew ? "" : `<div class="field"><label>마스터 ID</label><div class="master-id"><b>#${String(rec.id).padStart(4, "0")}</b> <span>자동 부여 · 수정 불가</span></div></div>`}

          <div class="field"><label>기종</label><input id="f_model" list="dl_model" value="${v('model')}" placeholder="선택 또는 입력" autocomplete="off"><datalist id="dl_model">${dl('model')}</datalist></div>
          <div class="field"><label>재질</label><input id="f_material" list="dl_material" value="${v('material')}" placeholder="선택 또는 입력" autocomplete="off"><datalist id="dl_material">${dl('material')}</datalist></div>

          <div class="field"><label>베이스규격</label><input id="f_base_size" list="dl_base_size" value="${v('base_size')}" placeholder="선택 또는 입력" autocomplete="off"><datalist id="dl_base_size">${dl('base_size')}</datalist></div>
          <div class="field"><label>체결</label><input id="f_buckle" list="dl_buckle" value="${v('buckle')}" placeholder="선택 또는 입력" autocomplete="off"><datalist id="dl_buckle">${dl('buckle')}</datalist></div>
          <div class="field"><label>형태 <span style="color:var(--muted);font-weight:400">(일자=일반형/아치=날개형)</span></label>
            <select id="f_strap_shape">${["", "일반형", "날개형"].map((s) => `<option value="${s}"${(rec.strap_shape || "") === s ? " selected" : ""}>${s || "(미지정)"}</option>`).join("")}</select></div>
        </div>
        <div class="field"><label>스트랩 형태 <span style="color:var(--muted);font-weight:400">(호환 방식)</span></label>
          <div class="shape-toggle" id="shapeToggle">
            <div class="shape-opt${isUniversal ? " on" : ""}" data-conn="universal"><div class="st-title">커넥터 연결형</div><div class="st-sub">공용 스트랩 + 커넥터 결합</div></div>
            <div class="shape-opt${isUniversal ? "" : " on"}" data-conn="dedicated"><div class="st-title">기종별 일체형</div><div class="st-sub">호환 기종 전용 러그 일체형</div></div>

    document.body.appendChild(bg);

    }));
    // 입력 변경 추적 → 바깥 클릭/취소 시 실수로 닫혀 내용 날아가는 것 방지
    let dirty = false;
    bg.querySelectorAll("input, select, textarea").forEach((el) =>
      el.addEventListener("input", () => { dirty = true; }));
    const close = () => bg.remove();
    let closing = false;
    const guardedClose = async () => {
      if (closing) return;
      if (!dirty) return close();
      closing = true;
      const ok = await uiConfirm("입력한 내용이 저장되지 않았습니다.\n정말 닫을까요?", { okText: "닫기", cancelText: "계속 작성", danger: true });
      closing = false;
      if (ok) close();
    };
    bg.addEventListener("click", (e) => { if (e.target === bg) guardedClose(); });
    document.getElementById("cancelBtn").addEventListener("click", guardedClose);
    const escHandler = (e) => { if (e.key === "Escape") guardedClose(); };
    document.addEventListener("keydown", escHandler);
    const origRemove = bg.remove.bind(bg);
    bg.remove = () => { document.removeEventListener("keydown", escHandler); origRemove(); };

    // 이미지 업로드

      if (error) { document.getElementById("upErr").textContent = "업로드 실패: " + error.message; return; }

      const path = `chart_${Date.now()}_${file.name.replace(/[^\w.\-]/g, "_")}`;
      const { error } = await sb.storage.from(BUCKET).upload(path, file, { upsert: true });
      if (error) { document.getElementById("ccErr").textContent = "업로드 실패: " + error.message; return; }
      const url = sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
      document.getElementById("f_color_chart").value = url;
      document.getElementById("ccPreview").src = url;
      document.getElementById("ccErr").textContent = "";
    });

    // 저장
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const obj = {};
      Object.keys(FIELDS).forEach((col) => { const el = document.getElementById("f_" + col); if (el) obj[col] = (el.value || "").trim(); });
      const sortV = document.getElementById("f_sort").value;
      obj.sort = sortV === "" ? null : Number(sortV);
      obj.sampling_date = document.getElementById("f_sampling_date").value || null;
      obj.color_count = obj.color_count ? Number(obj.color_count) : null;
      obj.launch_year = obj.launch_year ? obj.launch_year : null;   // 텍스트 "YYYY-MM"
      obj.price = obj.price ? Number(obj.price) : null;
      // 새 필드(FIELDS 밖) 저장
      ["alias", "kind", "flow_url", "source_url", "vendor", "memo"].forEach((col) => {
        const el = document.getElementById("f_" + col); if (el) obj[col] = el.value.trim() || null;
      });
      const costEl = document.getElementById("f_cost_cny");
      obj.cost_cny = costEl && costEl.value !== "" ? Number(costEl.value) : null;
      // 커넥터: 스트랩 형태 토글 기준. 커넥터 연결형=공용(범용), 기종별 일체형=입력한 호환 기종
      const sel = bg.querySelector("#shapeToggle .shape-opt.on");
      const connType = sel ? sel.dataset.conn : "universal";
      if (connType === "universal") obj.connector = "공용(범용)";
      else { const ce = document.getElementById("f_connector"); obj.connector = ce && ce.value.trim() ? ce.value.trim() : (rec.connector || null); }
      // '커넥터 연결형' 직접 입력 시에도 표준값으로 정규화
      if (/^커넥터\s*연결형$/.test((obj.connector || "").trim())) obj.connector = "공용(범용)";
      if (/^커넥터\s*연결형$/.test((obj.model || "").trim())) obj.model = "공용";
      const ccEl = document.getElementById("f_color_chart");
      obj.color_chart = ccEl && ccEl.value.trim() ? ccEl.value.trim() : null;
      if (!obj.name) { document.getElementById("saveErr").textContent = "제품명은 필수입니다."; return; }
      document.getElementById("saveErr").textContent = "저장 중…";
      const doSave = () => isNew ? sb.from(TABLE).insert(obj) : sb.from(TABLE).update(obj).eq("id", rec.id);
      // 네트워크 일시 끊김(Failed to fetch)에 대비해 최대 3회 재시도
      let resp;
      for (let i = 0; i < 3; i++) {
        try { resp = await doSave(); }
        catch (e) { resp = { error: { message: String(e && e.message || e) } }; }
        if (!resp.error) break;
        if (!/fetch|network|networkerror|load failed/i.test(resp.error.message || "")) break;  // 네트워크 외 오류는 즉시 표시
        document.getElementById("saveErr").textContent = `저장 재시도 중… (${i + 1}/3)`;
        await new Promise((r) => setTimeout(r, 600 * (i + 1)));
      }
      if (resp.error) { document.getElementById("saveErr").textContent = "저장 실패: " + resp.error.message + "\n(네트워크 문제면 잠시 후 다시 시도하거나 일반 브라우저로 열어보세요)"; return; }
      signalCatalog();           // 열려 있는 카탈로그 탭 자동 갱신
      close(); await loadRows();
    });
  }

  // 다른 탭의 카탈로그(index.html)에 "데이터 바뀜" 신호 → 자동 갱신
  function signalCatalog() {
    try { localStorage.setItem("catalog_dirty", String(Date.now())); } catch (e) {}
  }

  async function delRow(rec) {
    if (!rec) return;
    if (!await uiConfirm(`삭제할까요?\n\n${rec.name}`, { okText: "삭제", danger: true })) return;
    const { error } = await sb.from(TABLE).delete().eq("id", rec.id);
    if (error) { alert("삭제 실패: " + error.message); return; }
    signalCatalog();
    await loadRows();
  }

  // ====== 카테고리 관리 (사이드바 순서/이름/노출) ======
  // 카탈로그 productGroup 과 동일 규칙(커넥터 기준, 공용은 Nmm 일반형)
  function adminGroupOf(r) {
    const conn = String(r.connector || "").trim();
    if (conn) {
      if (/공용|공통|범용/.test(conn)) {
        const m = String(r.base_size || "").match(/(\d{2})\s*mm/) || String(r.size || "").match(/(\d{2})\s*mm/) || String(r.name || "").match(/(\d{2})\s*mm/);
        return m ? `${m[1]}mm 일반형` : "공용";
      }
      return conn;
    }
    return String(r.model || "").trim() || "기타";
  }
  let dragEl = null;
  let catLoadedKeys = [];   // 불러온 시점의 DB 카테고리 키(삭제 diff용)
  function catRowHtml(c) {
    return `<div class="cat-row" draggable="true" data-key="${esc(c.key)}">
      <span class="drag" title="드래그로 이동">⋮⋮</span>
      <input class="cat-label" value="${esc(c.label)}" placeholder="${esc(c.key)}">
      <span class="cat-key">${esc(c.key)} · ${c.count ? c.count + "개" : "신규"}</span>
      <label class="cat-vis-l"><input type="checkbox" class="cat-vis" ${c.visible ? "checked" : ""}> 노출</label>
      <span class="cat-move">
        <button class="catmv" data-dir="up" title="위로" aria-label="위로">▲</button>
        <button class="catmv" data-dir="down" title="아래로" aria-label="아래로">▼</button>
      </span>
      <button class="cat-del" title="이 카테고리 삭제" aria-label="삭제">×</button>
    </div>`;
  }
  function bindCatRow(row) {
    const cont = document.getElementById("catList");
    row.addEventListener("dragstart", () => { dragEl = row; setTimeout(() => row.classList.add("dragging"), 0); });
    row.addEventListener("dragend", () => { row.classList.remove("dragging"); dragEl = null; });
    row.querySelectorAll(".catmv").forEach((b) => b.addEventListener("click", () => {
      if (b.dataset.dir === "up" && row.previousElementSibling) cont.insertBefore(row, row.previousElementSibling);
      else if (b.dataset.dir === "down" && row.nextElementSibling) cont.insertBefore(row.nextElementSibling, row);
      row.querySelector(".cat-label").focus({ preventScroll: true });
      row.scrollIntoView({ block: "nearest" });
    }));
    row.querySelector(".cat-del").addEventListener("click", () => {
      const nm = row.querySelector(".cat-label").value.trim() || row.dataset.key;
      if (confirm(`'${nm}' 카테고리를 삭제할까요?\n(상품이 있는 카테고리는 '노출' 체크 해제로 숨기는 게 더 안전합니다.)`)) row.remove();
    });
  }
  function addCategory() {
    const name = (prompt("새 카테고리 이름을 입력하세요 (예: 가민, 신제품)") || "").trim();
    if (!name) return;
    const cont = document.getElementById("catList");
    if ([...cont.querySelectorAll(".cat-row")].some((r) => r.dataset.key === name)) { alert("이미 있는 카테고리입니다."); return; }
    cont.insertAdjacentHTML("beforeend", catRowHtml({ key: name, label: name, visible: true, count: 0 }));
    const row = cont.lastElementChild;
    bindCatRow(row);
    row.querySelector(".cat-label").focus();
    row.scrollIntoView({ block: "nearest" });
  }
  async function openCategories() {
    const counts = {};
    rows.forEach((r) => { const g = adminGroupOf(r); counts[g] = (counts[g] || 0) + 1; });
    let saved = [];
    try { const res = await sb.from("categories").select("*"); saved = res.data || []; } catch (e) {}
    catLoadedKeys = saved.map((c) => c.key);
    const savedMap = {}; saved.forEach((c) => (savedMap[c.key] = c));
    const CFG_ORDER = (window.CONFIG && CONFIG.CATEGORY_ORDER) || [];
    const CFG_LABELS = (window.CONFIG && CONFIG.CATEGORY_LABELS) || {};
    // 상품에서 파생된 그룹 + 이미 저장(추가)했던 카테고리의 합집합
    const allKeys = [...new Set([...Object.keys(counts), ...catLoadedKeys])];
    const list = allKeys.map((g) => {
      const s = savedMap[g];
      let sort = s ? s.sort : CFG_ORDER.indexOf(g);
      if (sort == null || sort < 0) sort = 9999;
      return { key: g, label: s ? (s.label || "") : (CFG_LABELS[g] || g), visible: s ? s.visible !== false : true, sort, count: counts[g] || 0 };
    }).sort((a, b) => a.sort - b.sort || b.count - a.count);

    app.innerHTML = `
      <div class="admin-top">
        <h1>카테고리 관리</h1>
        <div style="flex:1"></div>
        <button class="btn" id="catBack">← 상품 목록</button>
        <button class="btn brand" id="catSave">저장</button>
      </div>
      <div class="notice" style="margin-bottom:14px">⋮⋮ 드래그로 <b>순서</b> · 이름 <b>수정</b> · <b>노출</b> 체크 · <b>×</b>로 <b>삭제</b>. 저장하면 카탈로그 사이드바에 반영됩니다.</div>
      <button class="btn cat-add-btn" id="catAdd">＋ 새 카테고리 추가</button>
      <div id="catList">${list.map(catRowHtml).join("")}</div>`;
    document.getElementById("catBack").addEventListener("click", showAdmin);
    document.getElementById("catSave").addEventListener("click", saveCategories);
    document.getElementById("catAdd").addEventListener("click", addCategory);
    const cont = document.getElementById("catList");
    cont.querySelectorAll(".cat-row").forEach(bindCatRow);
    cont.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (!dragEl) return;
      const els = [...cont.querySelectorAll(".cat-row:not(.dragging)")];
      let best = { off: -Infinity, el: null };
      for (const ch of els) { const b = ch.getBoundingClientRect(); const off = e.clientY - b.top - b.height / 2; if (off < 0 && off > best.off) best = { off, el: ch }; }
      if (best.el == null) cont.appendChild(dragEl); else cont.insertBefore(dragEl, best.el);
    });
  }
  async function saveCategories() {
    const els = [...document.querySelectorAll("#catList .cat-row")];
    const payload = els.map((el, i) => ({
      key: el.dataset.key,
      label: el.querySelector(".cat-label").value.trim(),
      sort: i,
      visible: el.querySelector(".cat-vis").checked,
    }));
    // 삭제된 카테고리(불러온 DB키 중 현재 목록에 없는 것) → DB에서 제거
    const currentKeys = payload.map((p) => p.key);
    const removed = catLoadedKeys.filter((k) => !currentKeys.includes(k));
    if (removed.length) {
      const { error: delErr } = await sb.from("categories").delete().in("key", removed);
      if (delErr) { alert("삭제 실패: " + delErr.message); return; }
    }
    if (payload.length) {
      const { error } = await sb.from("categories").upsert(payload, { onConflict: "key" });
      if (error) { alert("저장 실패: " + error.message + "\n\n(categories 테이블이 없으면 supabase_categories.sql 먼저 실행하세요)"); return; }
    }
    try { signalCatalog(); } catch (e) {}
    alert("저장 완료! 카탈로그를 새로고침하면 사이드바에 반영됩니다.");
    showAdmin();
  }

  // ====== 표 컬럼 관리 (카탈로그 리스트 보기 순서/이름/노출) ======
  let colLoadedKeys = [];
  // 필수 컬럼(항상 노출, 숨김 불가): 제품명·이미지(사진)·규격
  const MUST_COLS = new Set([FIELDS.name, FIELDS.image, FIELDS.size].filter(Boolean));
  function colRowHtml(c) {
    const must = MUST_COLS.has(c.key);
    return `<div class="cat-row" draggable="true" data-key="${esc(c.key)}">
      <span class="drag" title="드래그로 이동">⋮⋮</span>
      <input class="cat-label" value="${esc(c.label)}" placeholder="${esc(c.key)}">
      <span class="cat-key">${esc(c.key)}${must ? ' · <b style="color:var(--brand)">필수</b>' : ""}</span>
      <label class="cat-vis-l"><input type="checkbox" class="cat-vis" ${must || c.visible ? "checked" : ""}${must ? " disabled" : ""}> 노출</label>
      <span class="cat-move">
        <button class="catmv" data-dir="up" title="위로" aria-label="위로">▲</button>
        <button class="catmv" data-dir="down" title="아래로" aria-label="아래로">▼</button>
      </span>
    </div>`;
  }
  function bindColRow(row) {
    const cont = document.getElementById("colList");
    row.addEventListener("dragstart", () => { dragEl = row; setTimeout(() => row.classList.add("dragging"), 0); });
    row.addEventListener("dragend", () => { row.classList.remove("dragging"); dragEl = null; });
    row.querySelectorAll(".catmv").forEach((b) => b.addEventListener("click", () => {
      if (b.dataset.dir === "up" && row.previousElementSibling) cont.insertBefore(row, row.previousElementSibling);
      else if (b.dataset.dir === "down" && row.nextElementSibling) cont.insertBefore(row.nextElementSibling, row);
      row.scrollIntoView({ block: "nearest" });
    }));
  }
  async function openColumns() {
    // 후보 컬럼 = COLUMN_MAP 의 한글 헤더(표에 나올 수 있는 모든 컬럼)
    const candidates = Object.values(FIELDS);
    const defHide = new Set((window.CONFIG && CONFIG.HIDE_COLUMNS) || []);
    let saved = [];
    try { const res = await sb.from("column_config").select("*"); saved = res.data || []; } catch (e) {}
    colLoadedKeys = saved.map((c) => c.key);
    const savedMap = {}; saved.forEach((c) => (savedMap[c.key] = c));
    const list = candidates.map((h, i) => {
      const s = savedMap[h];
      let sort = s ? s.sort : i;
      if (sort == null) sort = 9999;
      return { key: h, label: s ? (s.label || "") : "", visible: s ? s.visible !== false : !defHide.has(h), sort };
    }).sort((a, b) => a.sort - b.sort || candidates.indexOf(a.key) - candidates.indexOf(b.key));

    app.innerHTML = `
      <div class="admin-top">
        <h1>표 컬럼 관리</h1>
        <div style="flex:1"></div>
        <button class="btn" id="colBack">← 상품 목록</button>
        <a class="btn" href="index.html"><span aria-hidden="true">🛍️</span> 카탈로그</a>
        <button class="btn brand" id="colSave">저장</button>
      </div>
      <div class="notice" style="margin-bottom:14px">⋮⋮ 드래그로 <b>순서</b> · 이름 <b>수정</b>(비우면 원래 이름) · <b>노출</b> 체크 해제하면 표에서 숨김. 저장하면 카탈로그 <b>리스트(표) 보기</b>에 반영됩니다.</div>
      <div id="colList">${list.map(colRowHtml).join("")}</div>`;
    document.getElementById("colBack").addEventListener("click", showAdmin);
    document.getElementById("colSave").addEventListener("click", saveColumns);
    const cont = document.getElementById("colList");
    cont.querySelectorAll(".cat-row").forEach(bindColRow);
    cont.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (!dragEl) return;
      const els = [...cont.querySelectorAll(".cat-row:not(.dragging)")];
      let best = { off: -Infinity, el: null };
      for (const ch of els) { const b = ch.getBoundingClientRect(); const off = e.clientY - b.top - b.height / 2; if (off < 0 && off > best.off) best = { off, el: ch }; }
      if (best.el == null) cont.appendChild(dragEl); else cont.insertBefore(dragEl, best.el);
    });
  }
  async function saveColumns() {
    const els = [...document.querySelectorAll("#colList .cat-row")];
    const payload = els.map((el, i) => ({
      key: el.dataset.key,
      label: el.querySelector(".cat-label").value.trim(),
      sort: i,
      visible: el.querySelector(".cat-vis").checked,
    }));
    const currentKeys = payload.map((p) => p.key);
    const removed = colLoadedKeys.filter((k) => !currentKeys.includes(k));
    if (removed.length) {
      const { error: delErr } = await sb.from("column_config").delete().in("key", removed);
      if (delErr) { alert("삭제 실패: " + delErr.message); return; }
    }
    if (payload.length) {
      const { error } = await sb.from("column_config").upsert(payload, { onConflict: "key" });
      if (error) { alert("저장 실패: " + error.message + "\n\n(column_config 테이블이 없으면 supabase_column_config.sql 먼저 실행하세요)"); return; }
    }
    try { signalCatalog(); } catch (e) {}
    alert("저장 완료! 카탈로그 표 보기를 새로고침하면 반영됩니다.");
    showAdmin();
  }

  // ====== 값 일괄 정리 (기종·호환·재질·체결·베이스규격 값 한 번에 바꾸기) ======
  const VALUE_FIELDS = [
    { col: "model", label: "기종" },
    { col: "connector", label: "호환" },
    { col: "base_size", label: "베이스규격" },
    { col: "material", label: "재질" },
    { col: "buckle", label: "체결" },
  ];
  let valCol = "model";
  function renderValues() {
    const counts = {};
    rows.forEach((r) => { const v = String(r[valCol] || "").trim(); if (v) counts[v] = (counts[v] || 0) + 1; });
    const vals = Object.keys(counts).sort((a, b) => a.localeCompare(b, "ko"));
    app.innerHTML = `
      <div class="admin-top">
        <h1>값 일괄 정리</h1>
        <select id="valField" style="width:auto;flex:none;padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--panel);color:var(--text);font-size:14px">
          ${VALUE_FIELDS.map((f) => `<option value="${f.col}"${f.col === valCol ? " selected" : ""}>${f.label}</option>`).join("")}
        </select>
        <div style="flex:1"></div>
        <button class="btn" id="valBack">← 상품 목록</button>
        <a class="btn" href="index.html"><span aria-hidden="true">🛍️</span> 카탈로그</a>
        <button class="btn brand" id="valSave">변경 저장</button>
      </div>
      <div class="notice" style="margin-bottom:14px">값을 고치고 <b>변경 저장</b>하면 그 값을 가진 <b>모든 상품</b>에 일괄 적용됩니다. 같은 이름으로 바꾸면 두 값이 <b>합쳐집니다</b>. (비우면 변경 안 함)</div>
      <div id="valList">${vals.length ? vals.map((v) => `
        <div class="cat-row" data-old="${esc(v)}">
          <input class="cat-label" style="width:280px" value="${esc(v)}">
          <span class="cat-key">${counts[v]}개</span>
        </div>`).join("") : `<div class="notice">이 항목에 값이 없습니다.</div>`}</div>`;
    document.getElementById("valBack").addEventListener("click", showAdmin);
    document.getElementById("valField").addEventListener("change", (e) => { valCol = e.target.value; renderValues(); });
    document.getElementById("valSave").addEventListener("click", saveValues);
  }
  async function openValues() { valCol = "model"; renderValues(); }
  async function saveValues() {
    const els = [...document.querySelectorAll("#valList .cat-row")];
    const changes = els.map((el) => ({ old: el.dataset.old, neu: el.querySelector(".cat-label").value.trim() }))
      .filter((c) => c.neu && c.neu !== c.old);
    if (!changes.length) { alert("바뀐 값이 없습니다."); return; }
    const label = (VALUE_FIELDS.find((f) => f.col === valCol) || {}).label || valCol;
    const summary = changes.slice(0, 12).map((c) => `· ${c.old} → ${c.neu}`).join("\n") + (changes.length > 12 ? `\n… 외 ${changes.length - 12}건` : "");
    if (!await uiConfirm(`[${label}] ${changes.length}건 일괄 변경할까요?\n\n${summary}`, { okText: "변경", danger: false })) return;
    const btn = document.getElementById("valSave"); btn.disabled = true; btn.textContent = "저장 중…";
    for (const c of changes) {
      let r;
      for (let i = 0; i < 3; i++) {
        try { r = await sb.from(TABLE).update({ [valCol]: c.neu }).eq(valCol, c.old); }
        catch (e) { r = { error: { message: String(e && e.message || e) } }; }
        if (!r.error || !/fetch|network|load failed/i.test(r.error.message || "")) break;
        await new Promise((res) => setTimeout(res, 600 * (i + 1)));
      }
      if (r.error) { btn.disabled = false; btn.textContent = "변경 저장"; alert(`변경 실패(${c.old}): ${r.error.message}`); return; }
    }
    signalCatalog();
    await loadRows();   // rows 갱신
    alert(`${changes.length}건 변경 완료! 카탈로그를 새로고침하면 반영됩니다.`);
    renderValues();
  }

  boot();
  </script>
</body>
</html>

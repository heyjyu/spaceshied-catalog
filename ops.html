<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache" />
  <title>상품 운영 관리 — 스페이스쉴드</title>
  <!-- 테마: 모바일(≤860px) 라이트 고정, 데스크톱은 저장값(모든 페이지 동일 로직) -->
  <script>document.documentElement.dataset.theme = window.matchMedia("(max-width: 860px)").matches ? "light" : (localStorage.getItem("theme") || "light");</script>
  <link rel="stylesheet" href="styles.css?v=77" />
  <style>
    .ops-wrap { padding: 18px 24px 80px; max-width: 1280px; margin: 0 auto; }
    .ops-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -.03em; margin: 4px 0 2px; }
    .ops-head .sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }

    /* ===== 운영 현황 카드 ===== */
    .dash { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; margin-bottom:20px; }
    .dcard { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:14px 18px; box-shadow:var(--shadow-sm); cursor:pointer; transition:border-color .15s; }
    .dcard:hover { border-color:var(--brand); }
    .dcard .lbl { font-size:13px; font-weight:700; color:var(--muted); }
    .dcard .num { font-size:34px; font-weight:800; letter-spacing:-.03em; line-height:1.2; margin:2px 0; }
    .dcard .cap { font-size:12px; color:var(--muted); }
    .dcard .auto-n { display:inline-block; font-size:11px; font-weight:700; margin-top:5px; padding:1px 8px; border-radius:var(--radius-pill); background:var(--panel-2); border:1px solid var(--border); color:var(--muted); }
    .n-red    { color:#e0352b; } .n-orange { color:#e8850c; }
    .n-blue   { color:#2f6fed; } .n-green  { color:#15924a; }

    /* ===== 배너 ===== */
    .banner { display:flex; align-items:center; gap:10px; flex-wrap:wrap; font-size:13px; padding:10px 14px; border-radius:var(--radius-sm); margin-bottom:14px; border:1px solid; }
    .banner.warn { background:#fbeecb; border-color:#e8c76a; color:#7a5502; }
    .banner.info { background:#dbe7fe; border-color:#a9c4f8; color:#1d4fbd; }
    [data-theme="dark"] .banner.warn { background:#3a2c0e; border-color:#6b5312; color:#e6b53d; }
    [data-theme="dark"] .banner.info { background:#16294d; border-color:#2a4a86; color:#7eb0ff; }
    .banner a { color:inherit; font-weight:700; }

    /* ===== 툴바(탭/검색/정렬) ===== */
    .ops-tools { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; margin-bottom:14px; }
    .tabs { display:flex; flex-wrap:wrap; gap:6px; }
    .tabs button { border:1px solid var(--border); background:var(--panel); color:var(--muted); padding:7px 14px; border-radius:var(--radius-pill); cursor:pointer; font-size:13px; font-weight:600; }
    .tabs button.on { background:var(--brand); border-color:var(--brand); color:#fff; }
    .ops-tools input[type=search], .ops-tools select { padding:9px 13px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--panel); color:var(--text); font-size:14px; }
    .ops-tools input[type=search] { min-width:220px; flex:1; max-width:320px; }
    .cnt { margin-left:auto; font-size:13px; color:var(--muted); }

    /* ===== 표 ===== */
    .tblwrap { overflow-x:auto; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-sm); }
    table.ops { width:100%; border-collapse:collapse; font-size:13.5px; min-width:900px; }
    table.ops th { text-align:left; font-size:12px; color:var(--muted); font-weight:700; padding:11px 12px; border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; background:var(--panel); }
    table.ops td { padding:9px 12px; border-bottom:1px solid var(--border-soft); vertical-align:middle; }
    table.ops tr:last-child td { border-bottom:none; }
    table.ops tr:hover td { background:var(--brand-soft); }
    .skuid { font-family:ui-monospace,monospace; font-size:12px; color:var(--muted); white-space:nowrap; }
    .pcell { display:flex; align-items:center; gap:10px; min-width:220px; }
    .pcell img, .pcell .noimg { width:36px; height:36px; border-radius:8px; object-fit:cover; background:var(--panel-2); flex:none; }
    .pcell .nm { font-weight:600; line-height:1.3; }
    .pcell .meta { font-size:11.5px; color:var(--muted); margin-top:1px; }
    .pcell a.cp { font-size:11px; text-decoration:none; }
    td.rt { text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
    .est { color:var(--muted); font-size:11px; }
    .mgn-hi { color:#15924a; font-weight:700; } .mgn-mid { color:#b07403; font-weight:700; } .mgn-lo { color:#e0352b; font-weight:700; }
    .editable { cursor:pointer; border-bottom:1px dashed var(--border); }
    .editable:hover { color:var(--brand); }

    /* 상태 칩 (map/pipeline 과 동일 팔레트) */
    .st-active   { --bg:#dcf3e4; --tx:#15924a; } .st-planned  { --bg:#dbe7fe; --tx:#2563eb; }
    .st-partial  { --bg:#fbeecb; --tx:#b07403; } .st-sampling { --bg:#e9e1fb; --tx:#7c4dff; }
    .st-discont  { --bg:#e9e9ed; --tx:#9aa0a6; }
    [data-theme="dark"] .st-active   { --bg:#123524; --tx:#5fd98c; }
    [data-theme="dark"] .st-planned  { --bg:#16294d; --tx:#7eb0ff; }
    [data-theme="dark"] .st-partial  { --bg:#3a2c0e; --tx:#e6b53d; }
    [data-theme="dark"] .st-sampling { --bg:#2a1f47; --tx:#b69bff; }
    [data-theme="dark"] .st-discont  { --bg:#2a2a2e; --tx:#86868b; }
    .stchip { display:inline-block; font-size:11.5px; font-weight:700; padding:2px 9px; border-radius:var(--radius-pill); background:var(--bg); color:var(--tx); white-space:nowrap; }

    /* 작업 배지 */
    .fbadges { display:flex; flex-wrap:wrap; gap:4px; max-width:230px; }
    .fb { display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); border:1px solid var(--fc); color:var(--fc); background:color-mix(in srgb, var(--fc) 10%, transparent); white-space:nowrap; }
    .fb.auto { border-style:dashed; opacity:.85; }
    .memo { font-size:11px; color:var(--muted); margin-top:3px; max-width:230px; }
    .btn-flag { border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-size:12px; font-weight:600; padding:5px 11px; border-radius:var(--radius-pill); cursor:pointer; white-space:nowrap; }
    .btn-flag:hover { border-color:var(--brand); color:var(--brand); }

    /* 작업 지정 팝오버 */
    #pop { position:fixed; z-index:60; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 12px 32px rgba(0,0,0,.18); padding:14px; width:290px; display:none; }
    #pop h4 { margin:0 0 10px; font-size:13px; }
    #pop .flags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
    #pop .flags button { border:1px solid var(--border); background:var(--panel-2); color:var(--muted); font-size:12px; font-weight:600; padding:5px 10px; border-radius:var(--radius-pill); cursor:pointer; }
    #pop .flags button.on { border-color:var(--fc); color:var(--fc); background:color-mix(in srgb, var(--fc) 12%, transparent); }
    #pop textarea { width:100%; box-sizing:border-box; min-height:52px; padding:8px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--panel-2); color:var(--text); font-size:12.5px; resize:vertical; }
    #pop .row { display:flex; gap:8px; justify-content:flex-end; margin-top:10px; }
    #pop .row button { padding:7px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--panel-2); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; }
    #pop .row button.save { background:var(--brand); border-color:var(--brand); color:#fff; }

    #status { padding:40px; text-align:center; color:var(--muted); }
    .hide { display:none !important; }
    @media (max-width:860px){ .ops-wrap{padding:14px 12px 80px;} .dcard .num{font-size:28px;} }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 id="title" style="font-size:18px">🛠 상품 운영 관리</h1>
    <div style="flex:1"></div>
    <div class="topbar-actions">
      <button class="btn icon-only" id="btnTheme" title="다크/라이트 전환" aria-label="테마 전환">🌙</button>
      <a class="btn" href="index.html">← 카탈로그</a>
      <a class="btn" href="pipeline.html">📊 파이프라인</a>
      <a class="btn brand" href="admin.html">🔧 관리자</a>
    </div>
  </header>

  <div class="ops-wrap">
    <div class="ops-head">
      <h1>상품 운영 관리</h1>
      <p class="sub">쿠팡·스마트스토어 운영 작업(수정·보강·리뉴얼·결합·분리·가격변경·신고)을 상품별로 지정하고 추적한다. 카드 클릭 = 해당 작업만 필터.</p>
    </div>

    <div id="banner"></div>

    <div class="dash" id="dash"></div>

    <div class="ops-tools">
      <div class="tabs" id="tabs"></div>
      <input id="search" type="search" placeholder="SKU ID · 상품명 · 바코드 검색…" autocomplete="off" />
      <select id="sortSel">
        <option value="">기본 정렬</option>
        <option value="work">작업 필요 우선</option>
        <option value="mgn">여백률 낮은순</option>
        <option value="price">판매가 높은순</option>
      </select>
      <span class="cnt" id="cnt"></span>
    </div>

    <div id="status">데이터를 불러오는 중…</div>
    <div class="tblwrap hide" id="tblwrap">
      <table class="ops">
        <thead><tr>
          <th>SKU ID</th><th>상품</th><th>바코드</th><th>판매가</th><th>공급가</th><th>여백률</th><th>상태</th><th>작업 필요</th><th></th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="pop"></div>

  <script src="config.js?v=9"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  const S = (CONFIG.SUPABASE && CONFIG.SUPABASE.URL && CONFIG.SUPABASE.ANON_KEY) ? CONFIG.SUPABASE : null;
  const sb = S ? window.supabase.createClient(S.URL, S.ANON_KEY) : null;
  const CNY_KRW = 190;   // 공급가 추정 환율(원/CNY) — supply_price 컬럼이 비어 있을 때 cost_cny 로 근사

  // ── 작업 플래그 정의 (쿠팡 운영 액션) ──
  const FLAGS = [
    ["수정",     "✏️", "#e0352b"],
    ["보강",     "✨", "#e8850c"],
    ["리뉴얼",   "🔄", "#2f6fed"],
    ["결합",     "🔗", "#7c4dff"],
    ["분리",     "✂️", "#b07403"],
    ["가격변경", "💰", "#0a8f5b"],
    ["신고",     "🚨", "#e0352b"],
  ];
  const FCOLOR = Object.fromEntries(FLAGS.map(f=>[f[0], f[2]]));
  const FICON  = Object.fromEntries(FLAGS.map(f=>[f[0], f[1]]));

  const STATES = {
    planned:{cls:"st-planned",label:"기획"}, sampling:{cls:"st-sampling",label:"샘플"},
    partial:{cls:"st-partial",label:"일부"}, active:{cls:"st-active",label:"출시"},
    discont:{cls:"st-discont",label:"단종"},
  };
  function statusOf(r){
    const s = String(r.status||"").trim();
    if (/단종|disc/i.test(s)) return "discont";
    if (/기획|계획|plan/i.test(s)) return "planned";
    if (/샘플|sampl/i.test(s)) return "sampling";
    if (/일부|부분|partial/i.test(s)) return "partial";
    return "active";
  }

  const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const num = v => { const n = parseFloat(String(v??"").replace(/[^\d.]/g,"")); return isFinite(n)&&n>0 ? n : 0; };
  const won = n => "₩" + Math.round(n).toLocaleString();

  // ── 로컬(브라우저) 저장 폴백 ──
  let LOCAL = {};
  try { LOCAL = JSON.parse(localStorage.getItem("opsLocal")||"{}"); } catch(e){}
  const persistLocal = () => localStorage.setItem("opsLocal", JSON.stringify(LOCAL));

  let PRODUCTS = [], session = null, hasOpsCol = false, hasBizCol = false;
  const flagsOf = r => {
    const loc = LOCAL[r.id];
    if (loc) return loc.flags||[];
    return String(r.ops_flags||"").split(",").map(s=>s.trim()).filter(Boolean);
  };
  const noteOf = r => (LOCAL[r.id] ? (LOCAL[r.id].note||"") : String(r.ops_note||""));

  // ── 자동 감지: 동일명 분리노출(결합 후보) / 콘텐츠 누락(보강 후보) ──
  function enrich(){
    const dupMap = {};
    PRODUCTS.forEach(r=>{
      r._st = statusOf(r);
      // 동일상품 판정: 이름+기종+규격이 모두 같아야 (베이스+커넥터 구조상 기종별 분리는 의도된 것)
      const nk = String(r.name||"").toLowerCase().replace(/\(.*?\)/g,"").replace(/\s+/g,"");
      r._key = nk ? nk+"|"+String(r.model||"").replace(/\s+/g,"")+"|"+String(r.size||r.base_size||"").replace(/\s+/g,"") : "";
      if (r._key) (dupMap[r._key] = dupMap[r._key]||[]).push(r);
      r._price = num(r.price);
      r._supply = num(r.supply_price);
      r._supplyEst = !r._supply && num(r.cost_cny) ? Math.round(num(r.cost_cny)*CNY_KRW) : 0;
      const sup = r._supply || r._supplyEst;
      r._mgn = (r._price>0 && sup>0 && sup<r._price) ? (r._price-sup)/r._price*100 : null;
    });
    PRODUCTS.forEach(r=>{
      r._auto = [];
      const dup = dupMap[r._key];
      if (dup && dup.length>1) r._auto.push(["결합", "동일명 "+dup.length+"건"]);
      if (!r.image) r._auto.push(["보강", "사진 없음"]);
      else if (!num(r.color_count) && !String(r.color||"").trim()) r._auto.push(["보강", "색상옵션 미입력"]);
      if (r._supply && r._mgn!==null && r._mgn < 20) r._auto.push(["가격변경", "여백 "+r._mgn.toFixed(0)+"%"]);
    });
  }

  const hasFlag = (r,f) => flagsOf(r).includes(f) || r._auto.some(a=>a[0]===f);

  // ── 대시보드 카드 ──
  const CARDS = [
    { lbl:"수정 요청",   cap:"쿠팡 반려 / 수정 요청 대기", cls:"n-red",    tab:"수정",    count:r=>flagsOf(r).includes("수정") },
    { lbl:"결합 필요",   cap:"분리 노출 중인 동일 상품",   cls:"n-orange", tab:"결합",    count:r=>hasFlag(r,"결합") },
    { lbl:"보강 / 리뉴얼", cap:"콘텐츠 개선 대기",         cls:"n-blue",   tab:"improve", count:r=>flagsOf(r).includes("보강")||flagsOf(r).includes("리뉴얼")||r._auto.some(a=>a[0]==="보강") },
    { lbl:"이슈 감지",   cap:"편승 판매자 신고 대기",      cls:"n-green",  tab:"신고",    count:r=>hasFlag(r,"신고") },
  ];
  function renderDash(){
    document.getElementById("dash").innerHTML = CARDS.map((c,i)=>{
      const rows = PRODUCTS.filter(c.count);
      const manual = rows.filter(r=>flagsOf(r).length).length;
      const autoN = rows.length - manual;
      const numCls = (c.tab==="신고" && rows.length>0) ? "n-red" : c.cls;
      return `<div class="dcard" data-tab="${c.tab}">
        <div class="lbl">${c.lbl}</div>
        <div class="num ${numCls}">${rows.length}</div>
        <div class="cap">${c.cap}</div>
        ${autoN>0?`<span class="auto-n">자동감지 ${autoN}건 포함</span>`:""}
      </div>`;
    }).join("");
  }

  // ── 탭 ──
  let tab = "all";
  function renderTabs(){
    const t = [["all","전체"]].concat(FLAGS.map(f=>[f[0], f[1]+" "+f[0]]));
    document.getElementById("tabs").innerHTML = t.map(([k,l])=>
      `<button data-t="${k}" class="${tab===k?"on":""}">${l}</button>`).join("");
  }
  function matchTab(r){
    if (tab==="all") return true;
    if (tab==="improve") return hasFlag(r,"보강")||flagsOf(r).includes("리뉴얼");
    return hasFlag(r, tab);
  }

  function filtered(){
    const q = document.getElementById("search").value.trim().toLowerCase();
    let rows = PRODUCTS.filter(r=> matchTab(r) &&
      (!q || String(r.id).includes(q) || String(r.name||"").toLowerCase().includes(q) || String(r.barcode||"").includes(q)));
    const sort = document.getElementById("sortSel").value;
    if (sort==="work") rows = rows.slice().sort((a,b)=>(flagsOf(b).length+b._auto.length)-(flagsOf(a).length+a._auto.length));
    else if (sort==="mgn") rows = rows.slice().sort((a,b)=>(a._mgn??999)-(b._mgn??999));
    else if (sort==="price") rows = rows.slice().sort((a,b)=>b._price-a._price);
    return rows;
  }

  function mgnCell(r){
    if (r._mgn===null) return `<span class="est">—</span>`;
    const cls = r._mgn>=50?"mgn-hi":(r._mgn>=30?"mgn-mid":"mgn-lo");
    return `<span class="${cls}">${r._mgn.toFixed(1)}%</span>`;
  }
  function supplyCell(r){
    if (r._supply) return won(r._supply) + (hasBizCol&&session?"":"");
    if (r._supplyEst) return `${won(r._supplyEst)} <span class="est" title="원가(CNY)×${CNY_KRW}원 추정">≈</span>`;
    return `<span class="est">—</span>`;
  }

  function renderTable(){
    const rows = filtered();
    document.getElementById("cnt").textContent = rows.length + "건 · 실시간 DB";
    const editable = session && hasBizCol;
    document.getElementById("tbody").innerHTML = rows.map(r=>{
      const badges = flagsOf(r).map(f=>`<span class="fb" style="--fc:${FCOLOR[f]||'#888'}">${FICON[f]||""} ${esc(f)}</span>`)
        .concat(r._auto.map(([f,why])=>`<span class="fb auto" style="--fc:${FCOLOR[f]}" title="자동감지">${FICON[f]} ${esc(why)}</span>`)).join("");
      const note = noteOf(r);
      const st = STATES[r._st];
      return `<tr data-id="${r.id}">
        <td class="skuid">#${r.id}</td>
        <td><div class="pcell">
          ${r.image?`<img src="${esc(r.image)}" loading="lazy" alt="">`:`<div class="noimg"></div>`}
          <div><div class="nm">${esc(r.name||"(이름 없음)")}</div>
          <div class="meta">${esc([r.model,r.size||r.base_size].filter(Boolean).join(" · "))}${r.coupang_url?` <a class="cp" href="${esc(r.coupang_url)}" target="_blank" rel="noopener">쿠팡↗</a>`:""}</div></div>
        </div></td>
        <td class="rt${editable?" editable":""}" data-edit="barcode" title="${editable?"클릭해서 입력":""}">${esc(r.barcode||"") || '<span class="est">—</span>'}</td>
        <td class="rt">${r._price?won(r._price):'<span class="est">—</span>'}</td>
        <td class="rt${editable?" editable":""}" data-edit="supply_price" title="${editable?"클릭해서 입력":""}">${supplyCell(r)}</td>
        <td class="rt">${mgnCell(r)}</td>
        <td><span class="stchip ${st.cls}">${st.label}</span></td>
        <td><div class="fbadges">${badges||'<span class="est">—</span>'}</div>${note?`<div class="memo">📝 ${esc(note)}</div>`:""}</td>
        <td><button class="btn-flag" data-pop="${r.id}">＋ 작업</button></td>
      </tr>`;
    }).join("");
  }

  function render(){ renderDash(); renderTabs(); renderTable(); }

  // ── 배너 ──
  function renderBanner(){
    const b = document.getElementById("banner");
    if (!hasOpsCol) b.innerHTML = `<div class="banner warn">⚠️ 작업 플래그 DB 컬럼이 아직 없어 <b>이 브라우저에만</b> 저장됩니다. Supabase SQL Editor에서 <b>supabase_migration_ops.sql</b> 실행 시 팀 공유 저장으로 전환.</div>`;
    else if (!session) b.innerHTML = `<div class="banner info">ℹ️ 지금은 이 브라우저에만 저장됩니다. <a href="admin.html">관리자 로그인</a> 후 돌아오면 DB에 저장돼 팀이 함께 봅니다.</div>`;
    else b.innerHTML = "";
  }

  // ── 저장 ──
  async function saveFlags(id, flags, note){
    const row = PRODUCTS.find(p=>String(p.id)===String(id));
    if (!row) return;
    if (session && hasOpsCol){
      const { error } = await sb.from(S.TABLE||"products").update({ ops_flags: flags.join(","), ops_note: note||null }).eq("id", id);
      if (error){ alert("DB 저장 실패: "+error.message+"\n이 브라우저에만 임시 저장합니다."); LOCAL[id]={flags,note}; persistLocal(); }
      else { row.ops_flags = flags.join(","); row.ops_note = note; delete LOCAL[id]; persistLocal(); }
    } else { LOCAL[id]={flags,note}; persistLocal(); }
    render();
  }
  async function saveField(id, col, val){
    const row = PRODUCTS.find(p=>String(p.id)===String(id));
    const { error } = await sb.from(S.TABLE||"products").update({ [col]: val===""?null:val }).eq("id", id);
    if (error) alert("저장 실패: "+error.message);
    else { row[col] = val===""?null:val; enrich(); render(); }
  }

  // ── 팝오버 ──
  const pop = document.getElementById("pop");
  let popId = null;
  function openPop(id, anchor){
    popId = id;
    const row = PRODUCTS.find(p=>String(p.id)===String(id));
    const cur = flagsOf(row);
    pop.innerHTML = `<h4>${esc(row.name||"")} — 작업 지정</h4>
      <div class="flags">${FLAGS.map(([f,ic,c])=>`<button data-f="${f}" style="--fc:${c}" class="${cur.includes(f)?"on":""}">${ic} ${f}</button>`).join("")}</div>
      <textarea id="popNote" placeholder="운영 메모 (선택)">${esc(noteOf(row))}</textarea>
      <div class="row"><button data-act="close">닫기</button><button class="save" data-act="save">저장</button></div>`;
    pop.style.display = "block";
    const r = anchor.getBoundingClientRect();
    const w = 290, h = pop.offsetHeight;
    let x = Math.min(r.right - w, window.innerWidth - w - 10); if (x<10) x = 10;
    let y = r.bottom + 6; if (y + h > window.innerHeight - 10) y = r.top - h - 6;
    pop.style.left = x+"px"; pop.style.top = Math.max(10,y)+"px";
  }
  pop.addEventListener("click", e=>{
    const f = e.target.closest("[data-f]");
    if (f){ f.classList.toggle("on"); return; }
    const act = e.target.closest("[data-act]");
    if (!act) return;
    if (act.dataset.act==="save"){
      const flags = [...pop.querySelectorAll("[data-f].on")].map(b=>b.dataset.f);
      saveFlags(popId, flags, pop.querySelector("#popNote").value.trim());
    }
    pop.style.display = "none";
  });
  document.addEventListener("click", e=>{
    if (pop.style.display==="block" && !pop.contains(e.target) && !e.target.closest("[data-pop]")) pop.style.display="none";
  });

  // ── 이벤트 위임 ──
  document.getElementById("tbody").addEventListener("click", e=>{
    const pb = e.target.closest("[data-pop]");
    if (pb){ openPop(pb.dataset.pop, pb); return; }
    const ed = e.target.closest("[data-edit]");
    if (ed && session && hasBizCol){
      const id = ed.closest("tr").dataset.id;
      const row = PRODUCTS.find(p=>String(p.id)===String(id));
      const col = ed.dataset.edit;
      const cur = row[col] ?? "";
      const v = prompt(col==="barcode"?"바코드":"공급가(원)", cur);
      if (v===null) return;
      saveField(id, col, col==="supply_price" ? (num(v)||"") : v.trim());
    }
  });
  document.getElementById("dash").addEventListener("click", e=>{
    const c = e.target.closest("[data-tab]"); if (!c) return;
    tab = (tab===c.dataset.tab) ? "all" : c.dataset.tab; render();
  });
  document.getElementById("tabs").addEventListener("click", e=>{
    const b = e.target.closest("[data-t]"); if (!b) return;
    tab = b.dataset.t; render();
  });
  document.getElementById("search").addEventListener("input", renderTable);
  document.getElementById("sortSel").addEventListener("change", renderTable);

  const btnTheme = document.getElementById("btnTheme");
  const syncIcon = ()=>btnTheme.textContent = document.documentElement.dataset.theme==="dark"?"☀️":"🌙";
  syncIcon();
  btnTheme.onclick = ()=>{ const x = document.documentElement.dataset.theme==="dark"?"light":"dark"; document.documentElement.dataset.theme=x; localStorage.setItem("theme",x); syncIcon(); };

  // ── 로드 ──
  (async function load(){
    if (!sb){ document.getElementById("status").textContent = "Supabase 설정이 없습니다 (config.js)."; return; }
    const { data: sess } = await sb.auth.getSession();
    session = sess && sess.session;
    sb.auth.onAuthStateChange((_e, s)=>{ session = s; renderBanner(); renderTable(); });
    const { data, error } = await sb.from(S.TABLE||"products").select("*").order("id");
    if (error){ document.getElementById("status").textContent = "불러오기 실패: "+error.message; return; }
    PRODUCTS = data||[];
    hasOpsCol = PRODUCTS.length>0 && ("ops_flags" in PRODUCTS[0]);
    hasBizCol = PRODUCTS.length>0 && ("barcode" in PRODUCTS[0]);
    enrich();
    renderBanner();
    document.getElementById("status").classList.add("hide");
    document.getElementById("tblwrap").classList.remove("hide");
    render();
  })();
  </script>
</body>
</html>

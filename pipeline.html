<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제품 파이프라인 · 계보 — 스페이스쉴드</title>
  <!-- 테마: 모바일(≤860px) 라이트 고정, 데스크톱은 저장값(모든 페이지 동일 로직) -->
  <script>document.documentElement.dataset.theme = window.matchMedia("(max-width: 860px)").matches ? "light" : (localStorage.getItem("theme") || "light");</script>
  <link rel="stylesheet" href="styles.css?v=91" />
  <style>
    .pl-wrap { padding: 18px 24px 80px; }
    .pl-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -.03em; margin: 4px 0 2px; }
    .pl-head .sub { color: var(--muted); margin: 0 0 16px; font-size: 14px; }

    .pl-controls { display:flex; flex-wrap:wrap; gap:12px 16px; align-items:center; margin-bottom:16px; }
    .pl-controls select, .pl-controls input { padding:10px 14px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--panel); color:var(--text); font-size:14px; min-width:150px; }
    .seg { display:inline-flex; background: var(--panel-2); border:1px solid var(--border); border-radius:var(--radius-pill); padding:3px; }
    .seg button { border:none; background:transparent; color:var(--muted); padding:8px 18px; border-radius:var(--radius-pill); cursor:pointer; font-size:14px; font-weight:600; }
    .seg button.on { background: var(--brand); color:#fff; }

    /* 상태 색 (map.html 과 동일 팔레트) */
    .st-active   { --c:#34c759; --bg:#dcf3e4; --tx:#15924a; }
    .st-planned  { --c:#3b82f6; --bg:#dbe7fe; --tx:#2563eb; }
    .st-partial  { --c:#f5a623; --bg:#fbeecb; --tx:#b07403; }
    .st-sampling { --c:#a855f7; --bg:#e9e1fb; --tx:#7c4dff; }
    .st-discont  { --c:#c2c2c8; --bg:#e9e9ed; --tx:#9aa0a6; }
    [data-theme="dark"] .st-active   { --bg:#123524; --tx:#5fd98c; }
    [data-theme="dark"] .st-planned  { --bg:#16294d; --tx:#7eb0ff; }
    [data-theme="dark"] .st-partial  { --bg:#3a2c0e; --tx:#e6b53d; }
    [data-theme="dark"] .st-sampling { --bg:#2a1f47; --tx:#b69bff; }
    [data-theme="dark"] .st-discont  { --bg:#2a2a2e; --tx:#86868b; }

    /* ===== 칸반 ===== */
    .kanban { display:grid; grid-auto-flow:column; grid-auto-columns:minmax(240px,1fr); gap:14px; overflow-x:auto; align-items:start; padding-bottom:8px; }
    .kcol { background:var(--panel-2); border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; max-height:calc(100vh - 230px); }
    .kcol-head { position:sticky; top:0; display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); background:var(--panel-2); border-radius:var(--radius) var(--radius) 0 0; }
    .kcol-head .dot { width:11px; height:11px; border-radius:50%; background:var(--c); }
    .kcol-head .ttl { font-weight:800; font-size:14.5px; }
    .kcol-head .n { margin-left:auto; font-size:13px; font-weight:700; color:var(--muted); background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-pill); padding:1px 9px; }
    .kcol-body { overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }
    .kcard { display:flex; gap:10px; align-items:center; padding:8px; background:var(--panel); border:1px solid var(--border-soft); border-left:3px solid var(--c); border-radius:10px; text-decoration:none; color:inherit; }
    .kcard:hover { border-color:var(--brand); box-shadow:var(--shadow-sm); }
    .kcard img { width:42px; height:42px; object-fit:cover; border-radius:8px; background:var(--panel-2); flex:none; }
    .kcard .noimg { width:42px; height:42px; border-radius:8px; background:var(--panel-2); flex:none; }
    .kcard .nm { font-size:12.8px; line-height:1.3; font-weight:600; }
    .kcard .meta { font-size:11.5px; color:var(--muted); margin-top:2px; }
    .kcol-empty { color:var(--muted); font-size:12.5px; text-align:center; padding:18px 8px; }

    /* ===== 계보 트리 ===== */
    .tree { display:flex; flex-direction:column; gap:10px; }
    .fam { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; }
    .fam-head { display:flex; align-items:center; gap:12px; padding:13px 16px; cursor:pointer; }
    .fam-head:hover { background:var(--brand-soft); }
    .fam-head .caret { transition:transform .18s; color:var(--muted); font-size:12px; }
    .fam.open .fam-head .caret { transform:rotate(90deg); }
    .fam-head .name { font-weight:700; font-size:15px; }
    .fam-head .pills { margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
    .pill { font-size:11px; font-weight:700; padding:2px 8px; border-radius:var(--radius-pill); background:var(--bg); color:var(--tx); }
    .pill.exp { background:var(--panel-2); color:var(--muted); border:1px solid var(--border); }
    .fam-body { display:none; padding:4px 16px 14px; border-top:1px solid var(--border-soft); }
    .fam.open .fam-body { display:block; }
    .branch { display:flex; gap:12px; padding:10px 0; border-bottom:1px dashed var(--border-soft); }
    .branch:last-child { border-bottom:none; }
    .branch .conn { flex:none; width:150px; font-weight:700; font-size:13px; display:flex; align-items:center; gap:7px; }
    .branch .conn .dot { width:9px; height:9px; border-radius:50%; background:var(--c); }
    .branch .skus { display:flex; flex-wrap:wrap; gap:6px; }
    .sku { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:4px 9px; border-radius:var(--radius-pill); background:var(--bg); color:var(--tx); text-decoration:none; }
    .sku:hover { outline:2px solid var(--c); }

    .pl-stats { display:flex; gap:10px; flex-wrap:wrap; margin:0 0 16px; }
    .pl-stat { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 16px; box-shadow:var(--shadow-sm); }
    .pl-stat .n { font-size:20px; font-weight:800; letter-spacing:-.02em; }
    .pl-stat .l { font-size:12px; color:var(--muted); }
    #status { padding:40px; text-align:center; color:var(--muted); }
    .hide { display:none !important; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 id="title" style="font-size:18px">📊 파이프라인 · 계보</h1>
    <div style="flex:1"></div>
    <div class="topbar-actions">
      <button class="btn icon-only" id="btnTheme" title="다크/라이트 전환" aria-label="테마 전환">🌙</button>
      <a class="btn" href="index.html">← 카탈로그</a>
      <a class="btn" href="map.html">🧩 확장맵</a>
      <a class="btn brand" href="admin.html">🔧 관리자</a>
    </div>
  </header>

  <div class="pl-wrap">
    <div class="pl-head">
      <h1>제품 파이프라인 · 계보</h1>
      <p class="sub">상태별 진행 현황(칸반)과, 같은 베이스 스트랩이 어떤 커넥터로 확장됐는지(계보 트리)를 본다. 카드 클릭 → 관리자에서 편집.</p>
    </div>

    <div class="pl-controls">
      <div class="seg" id="segView">
        <button data-v="kanban" class="on">📋 파이프라인</button>
        <button data-v="tree">🌳 계보</button>
      </div>
      <select id="matSel"><option value="">전체 재질</option></select>
      <select id="connSel"><option value="">전체 커넥터</option></select>
      <input id="search" type="search" placeholder="제품·베이스 검색…" autocomplete="off" />
    </div>

    <div class="pl-stats" id="stats"></div>
    <div id="status">데이터를 불러오는 중…</div>
    <div id="kanban" class="kanban hide"></div>
    <div id="tree" class="tree hide"></div>
  </div>

  <script src="config.js?v=9"></script>
  <script>
  const S = (CONFIG.SUPABASE && CONFIG.SUPABASE.URL && CONFIG.SUPABASE.ANON_KEY) ? CONFIG.SUPABASE : null;

  // 상태 정의 — 파이프라인 흐름 순서(기획→샘플→일부→출시) + 단종
  const STATES = {
    planned:  { cls:"st-planned",  label:"기획" },
    sampling: { cls:"st-sampling", label:"샘플" },
    partial:  { cls:"st-partial",  label:"일부" },
    active:   { cls:"st-active",   label:"출시" },
    discont:  { cls:"st-discont",  label:"단종" },
  };
  const FLOW = ["planned","sampling","partial","active","discont"];
  function statusOf(r){
    const s = String(r.status||"").trim();
    if (/단종|disc/i.test(s)) return "discont";
    if (/기획|계획|plan/i.test(s)) return "planned";
    if (/샘플|sampl/i.test(s)) return "sampling";
    if (/일부|부분|partial/i.test(s)) return "partial";
    return "active";
  }
  const PRIORITY = ["active","partial","sampling","planned","discont"];
  function aggState(items){ for (const p of PRIORITY) if (items.some(r=>statusOf(r)===p)) return p; return "active"; }

  function baseFamily(r){
    if (r.base_family) return r.base_family;
    let n = String(r.name||"").replace(/\(.*?\)/g,"").replace(/\d+\s*mm/g,"");
    return n.replace(/\s+/g," ").trim();
  }
  const CONN_RULES = [
    ["공용","공용(범용)"],["갤럭시 워치8","갤럭시 워치8(러그)"],["갤럭시 울트라","갤럭시 울트라"],
    ["갤럭시 날개형","갤럭시(날개)"],["갤럭시 원클릭","갤럭시(원클릭)"],["갤럭시 핏3","갤럭시 핏3"],
    ["미밴드","샤오미 미밴드"],["애플","애플워치"],["화웨이","화웨이 핏4"],["가민","가민"],
    ["보이스캐디","보이스캐디"],["티렉스","아미즈핏 티렉스"],["프레스티지","프레스티지(프리미엄)"],
  ];
  function connector(r){
    if (r.connector) return r.connector;
    const m = String(r.model||"").trim();
    for (const [k,v] of CONN_RULES) if (m.startsWith(k)) return v;
    return m || "(미분류)";
  }

  let PRODUCTS=[];
  const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  function build(){
    PRODUCTS.forEach(r=>{ r._fam=baseFamily(r); r._conn=connector(r); r._mat=(r.material||"").trim(); r._st=statusOf(r); });
    const mats=[...new Set(PRODUCTS.map(r=>r._mat).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko"));
    document.getElementById("matSel").innerHTML=`<option value="">전체 재질</option>`+mats.map(m=>`<option>${esc(m)}</option>`).join("");
    const conns=[...new Set(PRODUCTS.map(r=>r._conn).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ko"));
    document.getElementById("connSel").innerHTML=`<option value="">전체 커넥터</option>`+conns.map(c=>`<option>${esc(c)}</option>`).join("");
    render();
  }

  function filtered(){
    const mat=document.getElementById("matSel").value;
    const conn=document.getElementById("connSel").value;
    const q=document.getElementById("search").value.trim().toLowerCase();
    return PRODUCTS.filter(r=>
      (!mat||r._mat===mat) && (!conn||r._conn===conn) &&
      (!q || String(r.name||"").toLowerCase().includes(q) || String(r._fam||"").toLowerCase().includes(q))
    );
  }

  function renderStats(rows){
    const c={}; rows.forEach(r=>c[r._st]=(c[r._st]||0)+1);
    const fams=new Set(rows.map(r=>r._fam).filter(Boolean));
    const cards=[["전체 SKU",rows.length],["베이스 디자인",fams.size]]
      .concat(FLOW.filter(k=>c[k]).map(k=>[STATES[k].label,c[k]]));
    document.getElementById("stats").innerHTML=cards.map(([l,n])=>`<div class="pl-stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("");
  }

  function renderKanban(rows){
    const by={}; FLOW.forEach(k=>by[k]=[]); rows.forEach(r=>by[r._st].push(r));
    const card=r=>{
      const meta=[r._conn, r.color].filter(Boolean).join(" · ");
      return `<a class="kcard ${STATES[r._st].cls}" href="admin.html" title="관리자에서 편집">
        ${r.image?`<img src="${esc(r.image)}" loading="lazy" alt="">`:`<div class="noimg"></div>`}
        <div><div class="nm">${esc(r.name||"(이름 없음)")}</div>${meta?`<div class="meta">${esc(meta)}</div>`:""}</div></a>`;
    };
    document.getElementById("kanban").innerHTML=FLOW.map(k=>{
      const items=by[k];
      return `<div class="kcol ${STATES[k].cls}">
        <div class="kcol-head"><span class="dot"></span><span class="ttl">${STATES[k].label}</span><span class="n">${items.length}</span></div>
        <div class="kcol-body">${items.length?items.map(card).join(""):`<div class="kcol-empty">없음</div>`}</div></div>`;
    }).join("");
  }

  function renderTree(rows){
    const map={};
    rows.forEach(r=>{ if(!r._fam) return; (map[r._fam]=map[r._fam]||{})[r._conn]=(map[r._fam][r._conn]||[]); map[r._fam][r._conn].push(r); });
    const fams=Object.entries(map).map(([fam,byConn])=>({fam,byConn,exp:Object.keys(byConn).length,
      n:Object.values(byConn).reduce((s,a)=>s+a.length,0)}));
    // 확장(커넥터 수) 많은 순 → 같은 베이스가 여러 워치로 뻗은 것부터
    fams.sort((a,b)=>(b.exp-a.exp)||(b.n-a.n)||a.fam.localeCompare(b.fam,"ko"));
    document.getElementById("tree").innerHTML=fams.map((f,i)=>{
      const pills=FLOW.map(k=>{ const c=Object.values(f.byConn).flat().filter(r=>r._st===k).length;
        return c?`<span class="pill ${STATES[k].cls}">${STATES[k].label} ${c}</span>`:""; }).join("");
      const branches=Object.entries(f.byConn)
        .sort((a,b)=>b[1].length-a[1].length)
        .map(([conn,items])=>`<div class="branch">
          <div class="conn ${STATES[aggState(items)].cls}"><span class="dot"></span>${esc(conn)}</div>
          <div class="skus">${items.map(r=>`<a class="sku ${STATES[r._st].cls}" href="admin.html" title="${esc(r.name)} · ${STATES[r._st].label}">${esc(r.size||r.base_size||"")||"·"} ${esc(r.color||r.name||"")}</a>`).join("")}</div>
        </div>`).join("");
      return `<div class="fam${f.exp>=2&&i<8?" open":""}" data-i="${i}">
        <div class="fam-head"><span class="caret">▶</span><span class="name">${esc(f.fam)}</span>
          <span class="pills"><span class="pill exp">${f.exp}커넥터 · ${f.n}SKU</span>${pills}</span></div>
        <div class="fam-body">${branches}</div></div>`;
    }).join("");
    document.getElementById("tree").querySelectorAll(".fam-head").forEach(h=>{
      h.addEventListener("click",()=>h.parentElement.classList.toggle("open"));
    });
  }

  let view="kanban";
  function render(){
    const rows=filtered();
    renderStats(rows);
    document.getElementById("status").style.display="none";
    const k=document.getElementById("kanban"), t=document.getElementById("tree");
    if(view==="kanban"){ renderKanban(rows); k.classList.remove("hide"); t.classList.add("hide"); }
    else { renderTree(rows); t.classList.remove("hide"); k.classList.add("hide"); }
  }

  document.querySelectorAll("#segView button").forEach(b=>b.onclick=()=>{
    document.querySelectorAll("#segView button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); view=b.dataset.v; render();
  });
  document.getElementById("matSel").onchange=render;
  document.getElementById("connSel").onchange=render;
  document.getElementById("search").oninput=render;
  const btnTheme=document.getElementById("btnTheme");
  const syncIcon=()=>btnTheme.textContent=document.documentElement.dataset.theme==="dark"?"☀️":"🌙";
  syncIcon();
  btnTheme.onclick=()=>{ const x=document.documentElement.dataset.theme==="dark"?"light":"dark"; document.documentElement.dataset.theme=x; localStorage.setItem("theme",x); syncIcon(); };

  (function load(){
    if(S){
      fetch(`${S.URL}/rest/v1/${S.TABLE||"products"}?select=*`,{headers:{apikey:S.ANON_KEY,Authorization:`Bearer ${S.ANON_KEY}`}})
        .then(r=>r.json()).then(d=>{ PRODUCTS=Array.isArray(d)?d:[]; build(); })
        .catch(err=>document.getElementById("status").textContent="불러오기 실패: "+err);
    } else {
      fetch("sample-data.csv").then(r=>r.text()).then(t=>{
        const [h,...lines]=t.trim().split(/\r?\n/); const cols=h.split(",");
        PRODUCTS=lines.map(l=>{const c=l.split(","),o={};cols.forEach((k,i)=>o[k]=c[i]||"");return {name:o["제품명"]||o.name,model:o["기종"]||o.model,material:o["재질"]||o.material,size:o["규격"]||o.size,color:o["색상"]||o.color,image:o["이미지"]||o.image,status:o["상태"]||o.status};});
        build();
      }).catch(err=>document.getElementById("status").textContent="불러오기 실패: "+err);
    }
  })();
  </script>
</body>
</html>

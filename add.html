<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신규 스트랩 등록</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .form-wrap { max-width: 560px; margin: 0 auto; padding: 20px; }
    .form-wrap h1 { font-size: 20px; margin: 6px 0 4px; }
    .form-wrap .desc { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .field input[type=text], .field input[type=date], .field select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .checks { display: flex; gap: 18px; }
    .checks label { display: flex; align-items: center; gap: 6px; font-weight: 500; }
    .preview { width: 100%; max-height: 220px; object-fit: contain; border-radius: 10px;
      border: 1px solid var(--border); margin-top: 8px; display: none; background: #f0f2f5; }
    .submit { width: 100%; padding: 13px; border: none; border-radius: 10px; background: var(--brand);
      color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .submit:disabled { opacity: .5; cursor: not-allowed; }
    .msg { margin-top: 14px; padding: 12px; border-radius: 10px; font-size: 14px; display: none; }
    .msg.ok { background: #dcfce7; color: var(--ok); display: block; }
    .msg.err { background: #fee2e2; color: var(--danger); display: block; }
    .topnav { display: flex; justify-content: space-between; align-items: center; }
    .topnav a { color: var(--brand); text-decoration: none; font-size: 14px; }
    .warn { background: #fef3c7; color: var(--warn); padding: 10px 12px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="form-wrap">
    <div class="topnav">
      <a href="index.html">← 카탈로그로</a>
    </div>
    <h1>➕ 신규 스트랩 등록</h1>
    <div class="desc">입력하면 구글시트 "신규입력" 탭에 저장됩니다. 사이트 반영은 관리자가 갱신(build) 후.</div>
    <div class="warn" id="cfgWarn">⚠️ 아직 연결 안 됨: <code>add.html</code> 의 <code>GAS_URL</code> 에 Apps Script 웹앱 주소를 넣어주세요. (apps-script.gs 참고)</div>

    <form id="f">
      <div class="field">
        <label>제품명 *</label>
        <input type="text" name="제품명" required placeholder="예) 디버클 마그네틱 실리콘 스트랩" />
      </div>
      <div class="row2">
        <div class="field">
          <label>기종</label>
          <select name="기종">
            <option value="">선택</option>
            <option>애플워치</option><option>갤럭시워치</option><option>화웨이</option>
            <option>가민</option><option>미밴드</option><option>공용</option><option>기타</option>
          </select>
        </div>
        <div class="field">
          <label>재질</label>
          <select name="재질">
            <option value="">선택</option>
            <option>실리콘</option><option>패브릭</option><option>나일론</option><option>가죽</option>
            <option>메탈</option><option>스틸</option><option>티타늄</option><option>TPU</option>
            <option>PC</option><option>비즈</option><option>하이브리드</option><option>기타</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>스트랩 규격</label>
          <input type="text" name="스트랩 규격" placeholder="예) 20mm / 42·44·45·49mm / 단일" />
        </div>
        <div class="field">
          <label>체결 형태</label>
          <input type="text" name="체결 형태" placeholder="예) 마그네틱 / 핀버클 / 벨크로" />
        </div>
      </div>
      <div class="field">
        <label>색상 (쉼표로 여러 개)</label>
        <input type="text" name="색상" placeholder="예) 블랙, 화이트, 네이비" />
      </div>
      <div class="row2">
        <div class="field">
          <label>샘플링 날짜</label>
          <input type="date" name="샘플링날짜" />
        </div>
        <div class="field">
          <label>컨텐츠 제작자</label>
          <input type="text" name="컨텐츠제작자" placeholder="담당자명" />
        </div>
      </div>
      <div class="field">
        <label>등록 채널</label>
        <div class="checks">
          <label><input type="checkbox" name="쿠팡등록" /> 쿠팡 등록</label>
          <label><input type="checkbox" name="네이버등록" /> 네이버 등록</label>
        </div>
      </div>
      <div class="field">
        <label>대표 이미지</label>
        <input type="file" id="img" accept="image/*" />
        <img id="preview" class="preview" alt="" />
      </div>
      <button type="submit" class="submit" id="submitBtn">등록하기</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    // ⬇⬇ Apps Script 웹앱 URL 을 여기에 붙여넣으세요 (apps-script.gs 배포 후) ⬇⬇
    const GAS_URL = "";

    const $ = (id) => document.getElementById(id);
    if (GAS_URL) $("cfgWarn").style.display = "none";

    let imageBase64 = "", imageName = "";
    $("img").addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      imageName = file.name;
      const reader = new FileReader();
      reader.onload = () => {
        imageBase64 = reader.result;
        $("preview").src = imageBase64;
        $("preview").style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    $("f").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = $("msg"); msg.className = "msg";
      if (!GAS_URL) { msg.className = "msg err"; msg.textContent = "GAS_URL 이 설정되지 않았습니다."; return; }
      const fd = new FormData($("f"));
      const data = {};
      for (const [k, v] of fd.entries()) data[k] = v;
      data["쿠팡등록"] = $("f").쿠팡등록.checked;
      data["네이버등록"] = $("f").네이버등록.checked;
      if (imageBase64) { data.imageBase64 = imageBase64; data.imageName = imageName; }

      $("submitBtn").disabled = true; $("submitBtn").textContent = "저장 중…";
      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" }, // CORS 프리플라이트 회피
          body: JSON.stringify(data),
        });
        const out = await res.json();
        if (out.ok) {
          msg.className = "msg ok"; msg.textContent = "✅ 등록 완료! 시트에 저장됐습니다.";
          $("f").reset(); $("preview").style.display = "none"; imageBase64 = "";
        } else {
          msg.className = "msg err"; msg.textContent = "실패: " + (out.error || "알 수 없음");
        }
      } catch (err) {
        msg.className = "msg err"; msg.textContent = "전송 오류: " + err.message;
      }
      $("submitBtn").disabled = false; $("submitBtn").textContent = "등록하기";
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- HTML은 항상 최신으로 받게(인앱 브라우저 캐시로 옛 화면 보이던 것 방지) -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>워치 스트랩 카탈로그</title>
  <!-- 테마: 모바일(≤860px)은 라이트 고정, 데스크톱만 저장값 사용 (깜빡임 방지 위해 head에서 먼저 설정) -->
  <script>document.documentElement.dataset.theme = window.matchMedia("(max-width: 860px)").matches ? "light" : (localStorage.getItem("theme") || "light");</script>
  <!-- 외부 라이브러리 (인터넷 필요). styles.css 는 Tabulator CSS 뒤에 둬야 표 커스텀이 적용됨 -->
  <link href="https://unpkg.com/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="styles.css?v=54" />
</head>
<body>
  <header class="topbar">
    <h1 id="title">워치 스트랩 카탈로그</h1>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="기종·재질·규격·체결·색상 검색…" autocomplete="off" />
    </div>
    <div class="topbar-actions">
      <button class="btn" id="btnFilters" aria-expanded="false" aria-controls="filters">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
<span class="btn-label">필터</span><span class="filter-count hidden" id="filterCount">0</span>
      </button>
      <div class="view-toggle" role="group" aria-label="보기 전환">
        <button class="btn" id="btnGallery" title="갤러리 보기" aria-label="갤러리 보기">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="3" y="3" width="8" height="8" rx="1.6"/><rect x="13" y="3" width="8" height="8" rx="1.6"/><rect x="3" y="13" width="8" height="8" rx="1.6"/><rect x="13" y="13" width="8" height="8" rx="1.6"/></svg>
        </button>
        <button class="btn active" id="btnTable" title="표 보기" aria-label="표 보기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
      </div>
      <a class="btn" id="btnMap" href="map.html" title="베이스×커넥터 확장맵 (신제품 후보 빈칸)"><span aria-hidden="true">🧩</span><span class="btn-label"> 확장맵</span></a>
      <a class="btn" id="btnPipeline" href="pipeline.html" title="상태별 파이프라인 + 제품 계보 트리"><span aria-hidden="true">📊</span><span class="btn-label"> 파이프라인</span></a>
      <a class="btn" id="btnVerify" href="verify.html" title="사진으로 포장 검수"><span aria-hidden="true">📷</span><span class="btn-label"> 포장검수</span></a>
      <a class="btn brand" id="btnAdd" href="admin.html" title="상품 추가·수정·삭제"><span aria-hidden="true">🔧</span><span class="btn-label"> 관리자</span></a>
      <button class="btn icon-only mobile-only" id="btnFavTop" title="즐겨찾기만 보기" aria-label="즐겨찾기만 보기">★</button>
      <button class="btn icon-only desktop-only" id="btnSidebarToggle" title="사이드바 숨기기/보이기" aria-label="사이드바 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button class="btn icon-only" id="btnTheme" title="다크/라이트 전환" aria-label="테마 전환">🌙</button>
    </div>
  </header>

  <div class="layout">
    <!-- 왼쪽 사이드바 래퍼 (탭을 overflow 바깥에 두기 위해 감쌈) -->
    <div class="sidebar-wrap" id="sidebarWrap">
      <aside class="sidebar" id="sidebar" aria-label="카테고리 및 필터">
      <div class="sidebar-inner">
        <!-- 통계 (상태별 개수 + 즐겨찾기) -->
        <section class="stats" id="stats"></section>

        <!-- 정렬 -->
        <div class="filter-head">정렬</div>
        <select id="sortSelect" class="filter">
          <option value="">기본 (사진 있는 순)</option>
          <option value="name">이름순 (가나다)</option>
          <option value="size">사이즈순 (mm)</option>
          <option value="colors">색상 많은순</option>
          <option value="status">상태순 (출시→단종)</option>
        </select>

        <!-- 필터 그룹 -->
        <div class="filter-head">필터</div>
        <section class="filters" id="filters">
          <select id="stockFilter" class="filter">
            <option value="">재고</option>
            <option value="out">품절 (0)</option>
            <option value="low">재고부족 (1~20)</option>
            <option value="ok">정상 (21+)</option>
          </select>
        </section>

        <div class="sidebar-actions">
          <button class="btn ghost" id="btnClear">필터 초기화</button>
        </div>
      </div>
      </aside>
      <button class="sidebar-collapse-tab desktop-only" id="sidebarCollapseTab" aria-label="사이드바 접기/펼치기">
        <svg class="sidebar-collapse-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

    <!-- 오른쪽 콘텐츠 -->
    <div class="content">
      <main>
        <div id="status">데이터를 불러오는 중…</div>
        <div id="table" class="hidden"></div>
        <div id="gallery" class="hidden"></div>
      </main>
    </div>
  </div>

  <!-- 상세 보기 (행/카드 클릭 시) -->
  <div id="overlay" class="hidden"></div>
  <aside id="detail" class="hidden" aria-label="상품 상세"></aside>

  <script src="config.js?v=54"></script>
  <script src="app.js?v=54"></script>
</body>
</html>
